<!-- base reset + 共通要素の <style> -->
<style>
/* minimal reset */
*,*::before,*::after{box-sizing:border-box}
html,body,h1,h2,h3,h4,h5,h6,p,ul,ol,li,figure,figcaption,blockquote,dl,dd{margin:0;padding:0}
ul,ol{list-style:none}
img,picture,video,canvas,svg{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
input,textarea,select{font:inherit;color:inherit}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{line-height:1.6;font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;color:#222;background:#fff;-webkit-font-smoothing:antialiased}
</style>
